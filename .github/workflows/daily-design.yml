name: daily-design-iteration

# Daily autonomous design improvement.
#   - Wakes daily at 11:07 UTC (= 4:07am PT)
#   - Reads the design-bank, the recent commits, and any open auto-design PRs.
#   - Picks ONE small/medium improvement, runs npm run build, opens a PR.
#   - User reviews each morning and merges or rolls back.
#
# To enable: add repo secret ANTHROPIC_API_KEY (from console.anthropic.com).
# Pause: `gh workflow disable daily-design.yml` (no commit needed).

on:
  schedule:
    - cron: "7 11 * * *"
  workflow_dispatch: {}    # manual run via "Run workflow" button

permissions:
  contents: write          # create branches + push
  pull-requests: write     # open PRs

jobs:
  iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: |
          npm ci
          pip install --quiet anthropic==0.39.0

      - name: configure git
        run: |
          git config user.name  "design-bot"
          git config user.email "design-bot@users.noreply.github.com"

      - name: run iterator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/daily_design_iteration.py
