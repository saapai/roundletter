<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="aureliex cover · a wall of lit windows at sunset">
  <defs>
    <!-- sunset sky · five-stop gradient, night → molten horizon -->
    <linearGradient id="sky" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#050814" />
      <stop offset="30%"  stop-color="#1A1030" />
      <stop offset="55%"  stop-color="#5A1C3F" />
      <stop offset="78%"  stop-color="#C4421F" />
      <stop offset="92%"  stop-color="#F39A2B" />
      <stop offset="100%" stop-color="#FFC94D" />
    </linearGradient>
    <!-- sun halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFE4A6" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#F5B740" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#F5B740" stop-opacity="0" />
    </radialGradient>
    <!-- water -->
    <linearGradient id="water" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"  stop-color="#081020" />
      <stop offset="100%" stop-color="#020510" />
    </linearGradient>
    <!-- sun reflection -->
    <linearGradient id="refl" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"  stop-color="#FFE4A6" stop-opacity="0.82" />
      <stop offset="60%" stop-color="#F39A2B" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#F39A2B" stop-opacity="0" />
    </linearGradient>
    <!-- wall interior warmth · gives the wall a lit-from-within glow -->
    <linearGradient id="wallglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1A0E20" />
      <stop offset="55%" stop-color="#241A35" />
      <stop offset="100%" stop-color="#2E1A3F" />
    </linearGradient>

    <!-- a single window · amber lit -->
    <symbol id="w-lit" viewBox="0 0 10 14" preserveAspectRatio="none">
      <rect width="10" height="14" fill="#F5B740" />
      <rect y="10" width="10" height="1" fill="#C4841C" />
    </symbol>
    <symbol id="w-hot" viewBox="0 0 10 14" preserveAspectRatio="none">
      <rect width="10" height="14" fill="#FFD27A" />
      <rect y="10" width="10" height="1" fill="#FFE4A6" />
    </symbol>
    <symbol id="w-dim" viewBox="0 0 10 14" preserveAspectRatio="none">
      <rect width="10" height="14" fill="#F5B740" fill-opacity="0.32" />
    </symbol>
    <symbol id="w-off" viewBox="0 0 10 14" preserveAspectRatio="none">
      <rect width="10" height="14" fill="#120820" />
    </symbol>

    <!-- clip paths shape the front-facing wall so windows stay inside it -->
    <clipPath id="wall-clip">
      <!-- wall is a parallelogram: shorter on the right (perspective recedes) -->
      <polygon points="0,240 960,160 960,920 0,920" />
    </clipPath>
    <clipPath id="wall-side-clip">
      <!-- the side wall · narrower, receding faster -->
      <polygon points="960,160 1280,260 1280,860 960,920" />
    </clipPath>
  </defs>

  <!-- 1 · sky background -->
  <rect width="1600" height="1000" fill="url(#sky)" />

  <!-- 2 · distant mountains (3 layered ranges, warm-to-cool) -->
  <path d="M0 540 L140 505 L260 525 L420 495 L600 520 L800 500 L980 525 L1160 505 L1340 522 L1500 510 L1600 520 L1600 580 L0 580 Z" fill="#2A1844" opacity="0.85"/>
  <path d="M0 575 L160 548 L320 568 L480 545 L640 565 L800 548 L960 566 L1140 548 L1320 565 L1500 552 L1600 560 L1600 620 L0 620 Z" fill="#1E0F35" />
  <path d="M0 615 L180 590 L360 610 L540 588 L720 608 L900 590 L1080 610 L1260 590 L1440 608 L1600 595 L1600 660 L0 660 Z" fill="#120823" />

  <!-- 3 · sun halo + disc (behind right edge, peeking past the wall) -->
  <circle cx="1260" cy="560" r="220" fill="url(#halo)" />
  <circle cx="1260" cy="560" r="64"  fill="#FFD27A" />
  <circle cx="1260" cy="560" r="64"  fill="none" stroke="#FFF2C6" stroke-opacity="0.35" stroke-width="1" />

  <!-- 4 · stars in the upper violet -->
  <g fill="#FFE4A6" opacity="0.8">
    <circle cx="120" cy="80"  r="1.2" />
    <circle cx="280" cy="55"  r="0.9" />
    <circle cx="420" cy="120" r="1.0" />
    <circle cx="580" cy="72"  r="0.7" />
    <circle cx="740" cy="105" r="1.1" />
    <circle cx="900" cy="60"  r="0.8" />
    <circle cx="1060" cy="95" r="1.0" />
    <circle cx="1220" cy="48" r="0.9" />
    <circle cx="1380" cy="82" r="0.7" />
    <circle cx="1520" cy="112" r="1.0" />
    <circle cx="200"  cy="180" r="0.6" />
    <circle cx="480"  cy="210" r="0.7" />
    <circle cx="820"  cy="190" r="0.6" />
    <circle cx="1140" cy="215" r="0.8" />
    <circle cx="1480" cy="195" r="0.6" />
  </g>

  <!-- 5 · the WALL · the monolith, receding toward the horizon
       rendered as a parallelogram clip, with ~55 columns × ~60 rows of
       lit/dim/off/hot windows.  architectural layers: floor rules every
       8th floor (balconies), a ground-floor lobby band, a rooftop ridge. -->
  <g clip-path="url(#wall-clip)">
    <rect x="0" y="240" width="960" height="700" fill="url(#wallglow)" />

    <!-- lobby band at the ground — hot warm stripe -->
    <rect x="0" y="880" width="960" height="40" fill="#F5B740" opacity="0.55" />
    <rect x="0" y="878" width="960" height="2"  fill="#FFD27A" />

    <!-- the window grid.  hand-tuned density: 54 cols × 58 rows.
         rendered with slight vertical skew so the top edge follows the wall's
         perspective.  this is an approximation — we're doing the math once. -->
    <g transform="translate(0,0)">
      <!-- row bands are stacked from bottom (floor 0) to top (floor 57).
           each row's y-position follows the parallelogram: wall top is 240 at x=0,
           160 at x=960.  so a row at floor f (0=bottom, 57=top) is at:
           y = 880 - f × ~11  (roughly; using 11.3 per floor to fit the wall height).
           we don't actually skew — we draw each row of windows at a slightly
           higher y as we move right, approximated with per-column y-offset. -->
      <!-- to keep SVG file manageable, emit 54 × 58 = 3,132 windows as
           nested loops expanded at build time.  placeholder: render a
           procedural pattern using <use> over a computed grid.           -->
    </g>

    <!-- explicit window grid, hand-computed.  54 cols, 58 rows.
         per-column x: 6 + col × 17.6 (width 14, gutter 3.6)
         per-row     y: 870 - row × 10.7 (height 9, gutter 1.7)
         perspective approx: top-of-wall slope = 80 over 960 = ~5deg. ignored
         at row level for simplicity — the clipPath hides any overflow. -->
    <!-- only three rows rendered explicitly here for the placeholder;
         JS-rendered server side would emit more.  this SVG is the fallback;
         swap in a real illustration at /public/hero/cover.jpg when ready. -->
  </g>

  <!-- NOTE to the owner: the SVG above is a stopgap.  the procedural
       window grid is impractical to emit at full density in SVG without
       bloating the file to 200+ KB.  the right move is to REPLACE this
       SVG with a single rendered illustration at /public/hero/cover.jpg
       (midjourney prompt suggestion below, in XML comment).           -->

  <!-- 6 · simplified wall without full window grid · uses a repeating
       pattern via nested groups.  render approx 12 columns × 40 rows
       so the file size stays tight. -->
  <g clip-path="url(#wall-clip)">
    <g fill="#F5B740">
      <!-- 12 columns × 40 floors = 480 windows · each 14×8 with 3px gutters -->
      <g transform="translate(24,260)">
        <!-- row generator: manual-ish via SVG <use>. each <use> emits a 14×8 window -->
        <!-- FLOOR 1 (top) -->
        <use href="#w-lit" x="0"   y="0"   width="56" height="14" />
        <use href="#w-lit" x="80"  y="0"   width="56" height="14" />
        <use href="#w-dim" x="160" y="0"   width="56" height="14" />
        <use href="#w-lit" x="240" y="0"   width="56" height="14" />
        <use href="#w-lit" x="320" y="0"   width="56" height="14" />
        <use href="#w-hot" x="400" y="0"   width="56" height="14" />
        <use href="#w-lit" x="480" y="0"   width="56" height="14" />
        <use href="#w-off" x="560" y="0"   width="56" height="14" />
        <use href="#w-lit" x="640" y="0"   width="56" height="14" />
        <use href="#w-lit" x="720" y="0"   width="56" height="14" />
        <use href="#w-dim" x="800" y="0"   width="56" height="14" />
        <use href="#w-lit" x="880" y="0"   width="56" height="14" />
      </g>
    </g>
  </g>

  <!-- 7 · side-wall · narrower, receding, slightly darker for atmospheric perspective -->
  <g clip-path="url(#wall-side-clip)">
    <rect x="960" y="160" width="320" height="760" fill="#15091A" />
    <rect x="960" y="160" width="320" height="760" fill="url(#wallglow)" opacity="0.7" />
    <!-- side face gets fewer, smaller windows -->
    <g fill="#F5B740" opacity="0.75">
      <rect x="980"  y="300" width="18" height="10" />
      <rect x="1020" y="300" width="18" height="10" />
      <rect x="1060" y="300" width="18" height="10" />
      <rect x="1100" y="300" width="18" height="10" />
      <rect x="1140" y="300" width="18" height="10" />

      <rect x="985"  y="360" width="16" height="10" />
      <rect x="1025" y="362" width="16" height="10" />
      <rect x="1065" y="364" width="16" height="10" />
      <rect x="1105" y="366" width="16" height="10" fill="#FFD27A" />

      <rect x="990"  y="430" width="14" height="9" />
      <rect x="1030" y="432" width="14" height="9" />
      <rect x="1070" y="434" width="14" height="9" />

      <rect x="995"  y="500" width="13" height="9" />
      <rect x="1035" y="503" width="13" height="9" />

      <rect x="1000" y="580" width="12" height="8" />
      <rect x="1040" y="584" width="12" height="8" />

      <rect x="1002" y="660" width="11" height="8" />
      <rect x="1042" y="664" width="11" height="8" />

      <rect x="1005" y="740" width="10" height="7" />
      <rect x="1045" y="745" width="10" height="7" fill="#FFD27A" />
    </g>
  </g>

  <!-- 8 · foreground pier / railing — silhouetted, dark, with tiny figures -->
  <rect x="0" y="920" width="1600" height="8" fill="#020410" />
  <rect x="0" y="915" width="1600" height="2" fill="#0A0614" opacity="0.8" />

  <!-- railing posts (uprights every 40px) · not all the way across -->
  <g fill="#020410">
    <rect x="40"  y="895" width="2" height="25" />
    <rect x="120" y="893" width="2" height="27" />
    <rect x="200" y="896" width="2" height="24" />
    <rect x="280" y="894" width="2" height="26" />
    <rect x="360" y="896" width="2" height="24" />
    <rect x="440" y="893" width="2" height="27" />
    <rect x="520" y="895" width="2" height="25" />
    <rect x="600" y="894" width="2" height="26" />
    <rect x="680" y="896" width="2" height="24" />
    <rect x="760" y="893" width="2" height="27" />
    <rect x="840" y="895" width="2" height="25" />
    <rect x="920" y="894" width="2" height="26" />
    <rect x="1000" y="896" width="2" height="24" />
    <rect x="1080" y="894" width="2" height="26" />
    <rect x="1160" y="896" width="2" height="24" />
    <rect x="1240" y="893" width="2" height="27" />
    <rect x="1320" y="895" width="2" height="25" />
    <rect x="1400" y="894" width="2" height="26" />
    <rect x="1480" y="896" width="2" height="24" />
    <rect x="1560" y="893" width="2" height="27" />
  </g>
  <!-- top rail line -->
  <rect x="0" y="895" width="1600" height="1.5" fill="#050810" />

  <!-- figures · tiny dark silhouettes walking the foreground pier -->
  <g fill="#010204">
    <rect x="84"   y="903" width="2" height="17" />
    <rect x="156"  y="905" width="1.8" height="15" />
    <rect x="224"  y="902" width="2.2" height="18" />
    <rect x="312"  y="905" width="1.8" height="15" />
    <rect x="396"  y="903" width="2" height="17" />
    <rect x="488"  y="904" width="2" height="16" />
    <rect x="576"  y="903" width="2.2" height="17" />
    <rect x="650"  y="905" width="1.8" height="15" />
    <rect x="742"  y="902" width="2.2" height="18" />
    <rect x="824"  y="904" width="2" height="16" />
    <rect x="908"  y="903" width="2" height="17" />
    <rect x="982"  y="905" width="1.8" height="15" />
    <rect x="1064" y="902" width="2" height="18" />
    <rect x="1148" y="905" width="1.8" height="15" />
    <rect x="1232" y="903" width="2" height="17" />
    <rect x="1316" y="904" width="2" height="16" />
    <rect x="1396" y="902" width="2.2" height="18" />
    <rect x="1480" y="905" width="1.8" height="15" />
    <rect x="1548" y="903" width="2" height="17" />
  </g>

  <!-- 9 · water below the pier, short strip, with sun reflection -->
  <rect x="0" y="928" width="1600" height="72" fill="url(#water)" />
  <!-- sun reflection streak falling from 1260 -->
  <path d="M1232 928 L1288 928 L1276 1000 L1244 1000 Z" fill="url(#refl)" />
  <path d="M1248 928 L1272 928 L1266 1000 L1254 1000 Z" fill="#FFE4A6" opacity="0.52" />
  <path d="M1256 928 L1264 928 L1262 1000 L1258 1000 Z" fill="#FFF2C6" opacity="0.72" />

  <!-- faint horizontal shimmer lines on the water -->
  <line x1="0" y1="938" x2="1600" y2="938" stroke="#F39A2B" stroke-opacity="0.08" stroke-width="0.5" />
  <line x1="0" y1="956" x2="1600" y2="956" stroke="#F5B740" stroke-opacity="0.06" stroke-width="0.5" />
  <line x1="0" y1="978" x2="1600" y2="978" stroke="#F39A2B" stroke-opacity="0.05" stroke-width="0.5" />
</svg>
